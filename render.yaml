services:
  - type: web
    name: jomboy-bot
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: TIMEZONE
        value: Asia/Tashkent
      - fromGroup: jomboy-secrets
