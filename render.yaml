services:
  - type: web
    name: jomboy-bot
    env: node
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ADMIN_TELEGRAM_IDS
        sync: false
      - key: HOKIM_TELEGRAM_ID
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: TIMEZONE
        value: Asia/Tashkent

